<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <title>Info Cuaca</title>
        <style>
            body {
                font-family: Arial;
                padding: 20px;
            }
            #hasil {
                margin-top: 20px;
                padding: 10px;
                border: 1px solid #ccc;
            }
        </style>
    </head>
    <body>
        <h1>Informasi Cuaca</h1>
        <input type="text" id="kota" placeholder="Masukkan nama kota" />
        <button onclick="ambilCuaca()">Lihat Cuaca</button>

        <div id="hasil"></div>

        <script>
            const apiKey = "cefcd1f8cc618d6283e278cb4bcdd61b"; // Ganti dengan API key Anda dari OpenWeatherMap

            function ambilCuaca() {
                const namaKota = document.getElementById("kota").value;
                const url = `https://api.openweathermap.org/data/2.5/weather?q=${namaKota}&units=metric&appid=${apiKey}&lang=id`;

                fetch(url)
                    .then((response) => {
                        if (!response.ok)
                            throw new Error("Kota tidak ditemukan!");
                        return response.json();
                    })
                    .then((data) => {
                        const suhu = data.main.temp;
                        const cuaca = data.weather[0].description;
                        const kelembaban = data.main.humidity;
                        const nama = data.name;

                        document.getElementById("hasil").innerHTML = `
            <h3>Cuaca di ${nama}</h3>
            <p>Suhu: ${suhu}°C</p>
            <p>Cuaca: ${cuaca}</p>
            <p>Kelembaban: ${kelembaban}%</p>
          `;
                    })
                    .catch((error) => {
                        document.getElementById("hasil").innerHTML =
                            `<p style="color:red">${error.message}</p>`;
                    });
            }
        </script>
    </body>
</html>
